<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>HEA Reachy Mini</title>
    <link rel="stylesheet" href="./styles.css">
  </head>
  <body>
    <main class="app-shell" aria-labelledby="app-title">
      <section class="workspace">
        <header class="topbar">
          <div>
            <p class="eyebrow">HEA-World prototype</p>
            <h1 id="app-title">Reachy Mini Channel</h1>
          </div>
          <div class="status-strip" aria-live="polite">
            <span id="connection-status" class="status-dot" data-state="idle"></span>
            <span id="connection-label">Mock ready</span>
          </div>
        </header>

        <div class="control-grid">
          <section class="panel panel-config" aria-labelledby="config-title">
            <h2 id="config-title">Session</h2>

            <label class="toggle-row">
              <input id="mock-api" type="checkbox" checked>
              <span>Mock HEA API</span>
            </label>

            <label>
              <span>HEA endpoint</span>
              <input id="endpoint" type="text" value="/api/reachymini/chat" autocomplete="off">
            </label>

            <label>
              <span>Install ID</span>
              <input id="install-id" type="text" placeholder="install_..." autocomplete="off">
            </label>

            <div class="split">
              <label>
                <span>Creator ID</span>
                <input id="creator-id" type="text" value="hea-world" placeholder="creator id" autocomplete="off">
              </label>
              <label>
                <span>HEA ID</span>
                <input id="hea-id" type="text" value="heaguide-web-001" placeholder="hea id" autocomplete="off">
              </label>
            </div>

            <div class="split">
              <label>
                <span>Visitor ID</span>
                <input id="visitor-id" type="text" autocomplete="off">
              </label>
              <label>
                <span>Session ID</span>
                <input id="session-id" type="text" autocomplete="off">
              </label>
            </div>

            <label>
              <span>Behavior profile</span>
              <select id="behavior-profile">
                <option value="default">Default</option>
                <option value="calm">Calm</option>
                <option value="showroom">Showroom</option>
                <option value="reduced_motion">Reduced motion</option>
              </select>
            </label>
          </section>

          <section class="panel panel-robot" aria-labelledby="robot-title">
            <h2 id="robot-title">Robot</h2>

            <label>
              <span>Robot mode</span>
              <select id="robot-mode">
                <option value="mock">Mock robot</option>
                <option value="reachy">Reachy SDK</option>
              </select>
            </label>

            <label>
              <span>Reachy SDK module</span>
              <input id="sdk-module-url" type="url" autocomplete="off">
            </label>

            <label>
              <span>Robot ID</span>
              <input id="robot-id" type="text" placeholder="auto-select first robot" autocomplete="off">
            </label>

            <div class="button-row">
              <button id="connect-button" type="button">Connect</button>
              <button id="stop-button" class="secondary" type="button">Stop</button>
            </div>

            <div class="video-frame">
              <video id="reachy-video" autoplay muted playsinline></video>
              <div id="mock-stage" class="mock-stage" aria-live="polite">
                <div id="mock-robot" class="mock-robot" data-cue="idle" aria-hidden="true">
                  <span class="mock-antenna mock-antenna-left"></span>
                  <span class="mock-antenna mock-antenna-right"></span>
                  <div class="mock-head">
                    <span class="mock-eye mock-eye-left"><span></span></span>
                    <span class="mock-eye mock-eye-right"><span></span></span>
                    <span class="mock-mouth"></span>
                  </div>
                  <span class="mock-neck"></span>
                </div>
                <div class="preview-status">
                  <p id="preview-cue">Idle expression preview</p>
                  <p id="mock-pose">Head 0 / 0 / 0 - Antennas 0 / 0 - Body 0</p>
                </div>
              </div>
            </div>
          </section>

          <section class="panel panel-chat" aria-labelledby="chat-title">
            <h2 id="chat-title">Conversation</h2>
            <form id="chat-form">
              <label>
                <span>Visitor says</span>
                <textarea id="user-text" rows="5" required>Can you explain what HEA-World does in a friendly way?</textarea>
              </label>
              <button id="ask-button" type="submit">Ask HEA</button>
            </form>
            <div id="answer" class="answer" aria-live="polite"></div>
          </section>

          <section class="panel panel-cues" aria-labelledby="cues-title">
            <h2 id="cues-title">Cue Plan</h2>
            <ol id="cue-list" class="cue-list"></ol>
          </section>

          <section class="panel panel-log" aria-labelledby="log-title">
            <h2 id="log-title">Events</h2>
            <ol id="event-log" class="event-log"></ol>
          </section>
        </div>
      </section>
    </main>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
